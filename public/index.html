<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Disc Golf Metrix Uusimaa C-tier search</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #171717;
      --muted: #666;
      --border: #d7d7d7;
      --soft: #f6f6f6;
      --err: #b00020;
      --ok: #0a6a2f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --fg: #f3f3f3;
        --muted: #b6b6b6;
        --border: #373737;
        --soft: #1d1d1d;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--fg); }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px; }
    .muted { color: var(--muted); }
    .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin: 20px 0 8px; }
    button { appearance: none; border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; cursor: pointer; font-size: 16px; background: var(--fg); color: var(--bg); font-weight: 600; }
    button:disabled { opacity: 0.6; cursor: wait; }
    .status { min-height: 1.5em; }
    .summary { display: flex; gap: 16px; flex-wrap: wrap; margin: 14px 0 20px; }
    .pill { background: var(--soft); border: 1px solid var(--border); border-radius: 999px; padding: 8px 12px; font-size: 14px; }
    .card { border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin: 14px 0; background: var(--bg); }
    .card h2 { margin: 0 0 10px; font-size: 20px; }
    .grid { display: grid; grid-template-columns: 220px 1fr; gap: 8px 12px; }
    .label { font-weight: 700; }
    .log { white-space: pre-wrap; background: var(--soft); border: 1px solid var(--border); padding: 14px; border-radius: 12px; font-size: 14px; max-height: 380px; overflow: auto; }
    .err { color: var(--err); }
    .ok { color: var(--ok); }
    a { color: inherit; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Disc Golf Metrix Uusimaa C-tier search</h1>
    <p class="muted">Fetches Disc Golf Metrix competitions using the exact Uusimaa search parameters for Finland, next 30 days, type C.</p>

    <div class="toolbar">
      <button id="loadBtn">Load competitions</button>
      <span id="status" class="status muted"></span>
    </div>

    <div id="summary" class="summary"></div>
    <div id="results"></div>

    <h2>Log</h2>
    <div id="log" class="log">Ready.</div>
  </div>

  <script>
    const btn = document.getElementById('loadBtn');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const logEl = document.getElementById('log');
    const summaryEl = document.getElementById('summary');

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function setLog(lines) { logEl.textContent = Array.isArray(lines) ? lines.join('\n') : String(lines || ''); }

    function renderSummary(data) {
      const items = [
        `Matches: ${data.events?.length || 0}`,
        `Rows parsed: ${data.row_count ?? 0}`,
        `Details fetched: ${data.checked_count ?? 0}`,
        `Area: Uusimaa`,
        `Type: C`,
        `Window: next 30 days`
      ];
      summaryEl.innerHTML = items.map((x) => `<div class="pill">${esc(x)}</div>`).join('');
    }

    function renderEvents(events) {
      if (!events?.length) {
        resultsEl.innerHTML = '<div class="card"><strong>No competitions found.</strong><div class="muted">Open the log below to see what the backend fetched and parsed.</div></div>';
        return;
      }

      resultsEl.innerHTML = events.map((ev) => `
        <article class="card">
          <h2><a href="${esc(ev.url || ev.source_url || '#')}" target="_blank" rel="noopener noreferrer">${esc(ev.title)}</a></h2>
          <div class="grid">
            <div class="label">Date</div><div>${esc(ev.date || '')}</div>
            <div class="label">Place</div><div>${esc(ev.place || '')}</div>
            <div class="label">Competition description</div><div>${esc(ev.description || '')}</div>
            <div class="label">Types of classes</div><div>${esc((ev.classes || []).join(', ') || '')}</div>
            <div class="label">Max amount of registrants</div><div>${esc(ev.max_registrants ?? '')}</div>
            <div class="label">How many people have registered</div><div>${esc(ev.registered ?? '')}</div>
            <div class="label">Due date for registration</div><div>${esc(ev.registration_due || '')}</div>
            <div class="label">Source URL</div><div><a href="${esc(ev.source_url || ev.url || '#')}" target="_blank" rel="noopener noreferrer">${esc(ev.source_url || ev.url || '')}</a></div>
          </div>
        </article>
      `).join('');
    }

    async function fetchJson(url) {
      const res = await fetch(url, { headers: { Accept: 'application/json' } });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch (err) { throw new Error(`Expected JSON from ${url}, got HTTP ${res.status}: ${text.slice(0, 500)}`); }
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    async function load() {
      btn.disabled = true;
      statusEl.textContent = 'Loading…';
      resultsEl.innerHTML = '';
      summaryEl.innerHTML = '';
      setLog(['Fetching /api/competitions ...']);
      try {
        const data = await fetchJson('/api/competitions');
        renderSummary(data);
        renderEvents(data.events || []);
        setLog(data.logs || []);
        statusEl.innerHTML = `<span class="ok">Done.</span>`;
      } catch (err) {
        statusEl.innerHTML = `<span class="err">Failed.</span>`;
        setLog(String(err));
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', load);
  </script>
</body>
</html>
