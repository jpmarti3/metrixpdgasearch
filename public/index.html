<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiscGolfMetrix Pages App</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #f4f7fb; color: #172033; }
    .page { max-width: 1320px; margin: 0 auto; padding: 24px; }
    .panel { background: #fff; border-radius: 18px; padding: 18px; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 18px; }
    h1, h2 { margin-top: 0; }
    p { line-height: 1.45; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 14px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #d5dbe7; border-radius: 10px; font: inherit; min-height: 42px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; }
    button { padding: 11px 16px; border: 0; border-radius: 10px; background: #111827; color: #fff; font: inherit; cursor: pointer; min-height: 42px; }
    button.secondary { background: #475569; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .checkbox { display: flex; align-items: center; gap: 8px; margin-top: 25px; }
    .checkbox input { width: 18px; height: 18px; min-height: 18px; }
    .mono { background: #0f172a; color: #e2e8f0; padding: 14px; border-radius: 10px; white-space: pre-wrap; overflow: auto; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 13px; }
    .cards { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }
    .card { background: #fafbff; border: 1px solid #e5eaf3; border-radius: 12px; padding: 14px; }
    .card .k { color: #6b7280; font-size: 14px; }
    .card .v { font-size: 22px; font-weight: 700; }
    .wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid #e8edf5; vertical-align: top; }
    .subtle { color: #64748b; font-size: 13px; }
    .warn { color: #9a3412; }
    .mobile-list { display: none; gap: 12px; }
    .event-card { background: #fafbff; border: 1px solid #e5eaf3; border-radius: 12px; padding: 14px; }
    .event-card h3 { margin: 0 0 6px; font-size: 17px; }
    .event-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; margin-top: 10px; }
    .event-meta div { min-width: 0; }
    .event-meta strong { display: block; font-size: 12px; color: #64748b; margin-bottom: 3px; }
    @media (max-width: 980px) {
      .grid, .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .page { padding: 14px; }
      .grid, .cards, .event-meta { grid-template-columns: 1fr; }
      .wrap { display: none; }
      .mobile-list { display: grid; }
      .panel { padding: 14px; border-radius: 14px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>DiscGolfMetrix Pages App</h1>
      <p>Cloudflare Pages app for dynamic DiscGolfMetrix event search, detailed event scraping, and CSV or JSON export.</p>
    </section>

    <section class="panel">
      <form id="form" class="grid">
        <label><span>Name</span><input name="name" value="" /></label>
        <label><span>Start date</span><input name="date1" type="date" value="" /></label>
        <label><span>End date</span><input name="date2" type="date" value="" /></label>
        <label><span>Registration start</span><input name="registration_date1" type="date" value="" /></label>
        <label><span>Registration end</span><input name="registration_date2" type="date" value="" /></label>
        <label><span>Country code</span><input name="country_code" value="FI" /></label>
        <label><span>Area</span><input name="area" value="Uusimaa" /></label>
        <label><span>Type</span><input name="type" value="C" /></label>
        <label><span>From</span><input name="from" type="number" min="1" value="1" /></label>
        <label><span>To per batch</span><input name="to" type="number" min="1" value="20" /></label>
        <label><span>Max pages</span><input name="maxPages" type="number" min="1" value="25" /></label>
        <label><span>Concurrency</span><input name="concurrency" type="number" min="1" max="5" value="2" /></label>
        <label class="checkbox"><input id="includeDetails" type="checkbox" checked /> <span>Scrape detailed event and registration pages</span></label>
        <div class="actions">
          <button type="submit">Run</button>
          <button type="button" id="downloadJsonBtn" class="secondary" disabled>Download JSON</button>
          <button type="button" id="downloadCsvBtn" class="secondary" disabled>Download CSV</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <strong>Status:</strong> <span id="status">Idle</span>
      <pre id="searchUrl" class="mono">Search URL will appear here.</pre>
    </section>

    <section class="panel">
      <h2>Summary</h2>
      <div id="cards" class="cards"></div>
    </section>

    <section class="panel">
      <h2>Events</h2>
      <div class="wrap">
        <table>
          <thead>
            <tr>
              <th>Event</th>
              <th>Date</th>
              <th>Course</th>
              <th>Location</th>
              <th>Registered</th>
              <th>Max registrants</th>
              <th>Entrants scraped</th>
              <th>Registration end</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="mobileList" class="mobile-list"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById("form");
    const statusEl = document.getElementById("status");
    const searchUrlEl = document.getElementById("searchUrl");
    const cardsEl = document.getElementById("cards");
    const tbody = document.getElementById("tbody");
    const mobileList = document.getElementById("mobileList");
    const downloadJsonBtn = document.getElementById("downloadJsonBtn");
    const downloadCsvBtn = document.getElementById("downloadCsvBtn");
    let lastResult = null;

    function formatDateInput(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function setDefaultDates() {
      const start = new Date();
      const end = new Date();
      end.setDate(end.getDate() + 30);
      form.elements.date1.value = formatDateInput(start);
      form.elements.date2.value = formatDateInput(end);
    }

    function payloadFromForm() {
      const data = new FormData(form);
      return {
        name: data.get("name") || "",
        date1: data.get("date1") || "",
        date2: data.get("date2") || "",
        registration_date1: data.get("registration_date1") || "",
        registration_date2: data.get("registration_date2") || "",
        country_code: data.get("country_code") || "",
        area: data.get("area") || "",
        type: data.get("type") || "",
        from: Number(data.get("from") || 1),
        to: Number(data.get("to") || 20),
        maxPages: Number(data.get("maxPages") || 25),
        concurrency: Number(data.get("concurrency") || 2),
        includeDetails: document.getElementById("includeDetails").checked
      };
    }

    function esc(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function renderCards(result) {
      cardsEl.innerHTML = "";
      const totalMax = (result.events || []).reduce((sum, event) => {
        return sum + Number(event.registration?.registrationSettings?.maxPlayers || 0);
      }, 0);
      const entries = [
        ["Events returned", result.totalEventsReturned],
        ["Events scraped", result.events?.length || 0],
        ["Total entrants scraped", (result.events || []).reduce((sum, event) => sum + (event.registration?.entrants?.length || 0), 0)],
        ["Combined max registrants", totalMax || ""]
      ];
      for (const [k, v] of entries) {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = '<div class="k">' + esc(k) + '</div><div class="v">' + esc(v) + '</div>';
        cardsEl.appendChild(div);
      }
    }

    function eventCourseText(event) {
      const course = event.details?.courseName || "";
      const layout = event.details?.layoutName || "";
      return [course, layout].filter(Boolean).join(" → ") || event.courseText || "";
    }

    function eventLocationText(event) {
      return [event.details?.region, event.details?.city].filter(Boolean).join(", ") || event.locationText || "";
    }

    function eventDateText(event) {
      return event.details?.headerText || event.dateTimeText || "";
    }

    function eventRegisteredText(event) {
      return event.playersShown ?? event.registration?.registrationSettings?.registeredPlayers ?? "";
    }

    function eventMaxText(event) {
      return event.registration?.registrationSettings?.maxPlayers ?? "";
    }

    function eventRegistrationEndText(event) {
      return event.registration?.registrationSettings?.registrationEnd || event.registrationOpenUntilText || "";
    }

    function renderTable(result) {
      tbody.innerHTML = "";
      mobileList.innerHTML = "";
      for (const event of result.events) {
        const scrapeError = event.scrapeError ? '<div class="warn">' + esc(event.scrapeError) + '</div>' : '';

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>
            <div><strong><a href="${esc(event.eventUrl)}" target="_blank" rel="noreferrer">${esc(event.title || event.eventId)}</a></strong></div>
            <div class="subtle">${esc(event.eventType || "")}</div>
            ${scrapeError}
          </td>
          <td>${esc(eventDateText(event))}</td>
          <td>${esc(eventCourseText(event))}</td>
          <td>${esc(eventLocationText(event))}</td>
          <td>${esc(eventRegisteredText(event))}</td>
          <td>${esc(eventMaxText(event))}</td>
          <td>${esc(event.registration?.entrants?.length ?? 0)}</td>
          <td>${esc(eventRegistrationEndText(event))}</td>
        `;
        tbody.appendChild(tr);

        const card = document.createElement("article");
        card.className = "event-card";
        card.innerHTML = `
          <h3><a href="${esc(event.eventUrl)}" target="_blank" rel="noreferrer">${esc(event.title || event.eventId)}</a></h3>
          <div class="subtle">${esc(event.eventType || "")}</div>
          ${scrapeError}
          <div class="event-meta">
            <div><strong>Date</strong>${esc(eventDateText(event))}</div>
            <div><strong>Course</strong>${esc(eventCourseText(event))}</div>
            <div><strong>Location</strong>${esc(eventLocationText(event))}</div>
            <div><strong>Registered</strong>${esc(eventRegisteredText(event))}</div>
            <div><strong>Max registrants</strong>${esc(eventMaxText(event))}</div>
            <div><strong>Entrants scraped</strong>${esc(event.registration?.entrants?.length ?? 0)}</div>
            <div><strong>Registration end</strong>${esc(eventRegistrationEndText(event))}</div>
          </div>
        `;
        mobileList.appendChild(card);
      }
    }

    function rowsForCsv(result) {
      const rows = [];
      for (const event of result.events || []) {
        const entrants = event.registration?.entrants || [];
        if (!entrants.length) {
          rows.push({
            eventId: event.eventId,
            eventTitle: event.title || "",
            eventUrl: event.eventUrl || "",
            dateText: event.details?.headerText || event.dateTimeText || "",
            region: event.details?.region || "",
            city: event.details?.city || "",
            courseName: event.details?.courseName || "",
            layoutName: event.details?.layoutName || "",
            maxPlayers: event.registration?.registrationSettings?.maxPlayers ?? "",
            registrationEnd: event.registration?.registrationSettings?.registrationEnd || event.registrationOpenUntilText || "",
            playerName: "",
            divisionName: "",
            pdgaNumber: "",
            pdgaRating: "",
            club: "",
            waitingListPosition: "",
            confirmed: "",
            registeredOn: ""
          });
        } else {
          for (const entrant of entrants) {
            rows.push({
              eventId: event.eventId,
              eventTitle: event.title || "",
              eventUrl: event.eventUrl || "",
              dateText: event.details?.headerText || event.dateTimeText || "",
              region: event.details?.region || "",
              city: event.details?.city || "",
              courseName: event.details?.courseName || "",
              layoutName: event.details?.layoutName || "",
              maxPlayers: event.registration?.registrationSettings?.maxPlayers ?? "",
              registrationEnd: event.registration?.registrationSettings?.registrationEnd || event.registrationOpenUntilText || "",
              playerName: entrant.playerName || "",
              divisionName: entrant.divisionName || "",
              pdgaNumber: entrant.pdgaNumber || "",
              pdgaRating: entrant.pdgaRating ?? "",
              club: entrant.club || "",
              waitingListPosition: entrant.waitingListPosition ?? "",
              confirmed: entrant.confirmed ?? "",
              registeredOn: entrant.registeredOn || ""
            });
          }
        }
      }
      return rows;
    }

    function toCsv(rows) {
      if (!rows.length) return "";
      const headers = Object.keys(rows[0]);
      const escapeCell = (value) => {
        const s = String(value ?? "");
        return /[",\n]/.test(s) ? '"' + s.replaceAll('"', '""') + '"' : s;
      };
      const lines = [headers.join(","), ...rows.map(row => headers.map(h => escapeCell(row[h])).join(","))];
      return lines.join("\n");
    }

    function downloadBlob(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function render(result) {
      searchUrlEl.textContent = result.searchUrl || "";
      renderCards(result);
      renderTable(result);
      downloadJsonBtn.disabled = false;
      downloadCsvBtn.disabled = false;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Searching and scraping...";
      downloadJsonBtn.disabled = true;
      downloadCsvBtn.disabled = true;
      cardsEl.innerHTML = "";
      tbody.innerHTML = "";
      mobileList.innerHTML = "";

      try {
        const response = await fetch("/api/search", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payloadFromForm())
        });

        const result = await response.json();
        if (!response.ok) throw new Error(result.error || ("HTTP " + response.status));
        lastResult = result;
        render(result);
        statusEl.textContent = "Done";
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        searchUrlEl.textContent = String(err.stack || err.message || err);
      }
    });

    downloadJsonBtn.addEventListener("click", () => {
      if (!lastResult) return;
      downloadBlob("discgolfmetrix-results.json", JSON.stringify(lastResult, null, 2), "application/json");
    });

    downloadCsvBtn.addEventListener("click", () => {
      if (!lastResult) return;
      const csv = toCsv(rowsForCsv(lastResult));
      downloadBlob("discgolfmetrix-results.csv", csv, "text/csv;charset=utf-8");
    });

    setDefaultDates();
  </script>
</body>
</html>
